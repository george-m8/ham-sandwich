version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8788:8788"
    volumes:
      - ./:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - FIREBASE_AUTH_EMULATOR_HOST=firebase:9099
      - FIRESTORE_EMULATOR_HOST=firebase:8080
      - FIREBASE_STORAGE_EMULATOR_HOST=firebase:9199
    depends_on:
      firebase:
        condition: service_healthy
    networks:
      - ham-net

  firebase:
    build:
      context: .
      dockerfile: Dockerfile.firebase
    ports:
      - "9099:9099"
      - "8080:8080"
      - "9199:9199"
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ham-net

networks:
  ham-net:
    driver: bridge
