<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ham Sandwich — CHIRP Directory</title>
  <link rel="stylesheet" href="/css/text.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/inputs.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <div class="receipt-wrapper receipt-wrapper-wide site-shell">
    <nav class="receipt-header" id="main-nav">
      <div class="horizontal-flex">
        <a href="/" class="nav-logo" id="site-name">🥪 Ham Sandwich</a>
        <div class="nav-links horizontal-flex" id="nav-links">
          <a href="/chirp-csv/">CHIRP CSV</a>
          <a href="/test/">Tests</a>
          <a href="/radios/">Radios</a>
          <a href="/links/">Links</a>
          <a href="/account/" id="account-link">Login</a>
        </div>
        <button class="btn-xs nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
      </div>
    </nav>

    <main class="receipt-section">
      <h2>CHIRP CSV Directory</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="mode-filter">Mode</label>
          <select id="mode-filter">
            <option value="all">All</option>
            <option value="FM">FM</option>
            <option value="AM">AM</option>
            <option value="DV">DMR / DV</option>
            <option value="USB">SSB / USB</option>
            <option value="LSB">LSB</option>
            <option value="CW">CW</option>
          </select>
        </div>
        <div class="form-group">
          <label for="band-filter">Band</label>
          <select id="band-filter">
            <option value="all">All</option>
            <option value="HF">HF</option>
            <option value="VHF">VHF</option>
            <option value="UHF">UHF</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="repeaters-filter">Repeaters</label>
          <select id="repeaters-filter">
            <option value="all">Any</option>
            <option value="included">Included</option>
            <option value="excluded">Excluded</option>
          </select>
        </div>
        <div class="form-group">
          <label for="sort-filter">Sort By</label>
          <select id="sort-filter">
            <option value="newest">Newest</option>
            <option value="downloads">Most Downloaded</option>
            <option value="channels">Most Channels</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="directory-search">Search</label>
        <input type="text" id="directory-search" placeholder="Search generated CSVs">
      </div>

      <section class="output-box" id="directory-status" aria-live="polite">Loading directory entries…</section>

      <section class="cards-grid" id="directory-list"></section>
    </main>

    <footer class="receipt-footer">
      <p class="small-text">Ham Sandwich — Amateur Radio Tools</p>
      <div class="horizontal-flex gap-sm support-links" id="support-links"></div>
      <p class="small-text light-text">© <span id="footer-year">2026</span></p>
    </footer>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/directory.js"></script>
</body>
</html>
