<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ham Sandwich — Account</title>
  <link rel="stylesheet" href="/css/text.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/inputs.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <div class="receipt-wrapper site-shell">
    <nav class="receipt-header" id="main-nav">
      <div class="horizontal-flex">
        <a href="/" class="nav-logo" id="site-name">🥪 Ham Sandwich</a>
        <div class="nav-links horizontal-flex" id="nav-links">
          <a href="/chirp-csv/">CHIRP CSV</a>
          <a href="/test/">Tests</a>
          <a href="/radios/">Radios</a>
          <a href="/links/">Links</a>
          <a href="/account/" id="account-link">Login</a>
        </div>
        <button class="btn-xs nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
      </div>
    </nav>

    <main class="receipt-section">
      <h2>Account</h2>
      <form>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••">
        </div>
        <button type="button" class="btn-box">Login (Placeholder)</button>
      </form>
      <div class="horizontal-flex action-row-center">
        <a class="btn-secondary" href="/account/keys/">Manage Keys</a>
        <a class="btn-secondary" href="/account/history/">View History</a>
      </div>
    </main>

    <footer class="receipt-footer">
      <p class="small-text">Ham Sandwich — Amateur Radio Tools</p>
      <div class="horizontal-flex gap-sm support-links" id="support-links"></div>
      <p class="small-text light-text">© <span id="footer-year">2026</span></p>
    </footer>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
